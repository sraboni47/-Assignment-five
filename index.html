<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GitHub Issues Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: Geist;
      }
    </style>
  </head>

  <body class="bg-[#F3F4F6] min-h-screen">

    
    <!-- CARD -->
     <div class="flex items-center justify-center min-h-[90vh]">
     
    <div class="bg-white shadow-lg rounded-lg p-8 w-[520px]">
      <div class="flex justify-center mb-6">
        <img src="github-logo.png" class="w-20" />
      </div>

      <!-- TITLE -->
      <h1 class="text-2xl font-semibold text-center text-gray-800">
        GitHub Issues Tracker
      </h1>

      <p class="text-center text-gray-500 mt-1 mb-6">
        Sign in to manage your issues
      </p>

      <!-- USERNAME -->
      <label class="text-sm text-white">Username</label>

     <input
id="username"
type="text"
placeholder="Enter Username"
class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none"
/>

      <p class="text-[#4A00FF] text-sm mt-1 mb-4">Default: admin</p>

      <!-- PASSWORD -->
      <label class="text-sm text-gray-700">Password</label>

      <input
id="password"
type="password"
placeholder="Enter Password"
class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none"
/>

      <p class="text-[#4A00FF] text-sm mt-1 mb-4">Default: admin123</p>

      <!-- BUTTON -->
     <button
id="loginBtn"
class="btn w-full text-white bg-[#4A00FF] border-none hover:bg-[#4A00FF]/90"
>
Sign In
</button>

      <!-- DIVIDER -->
      <div class="divider">OR</div>

      <!-- DEMO BOX -->
      <div class="bg-gray-100 p-4 rounded-lg text-center">
        <p class="text-gray-500 text-sm mb-2">Demo Credentials:</p>

        <p class="text-[#1F2937]">
          <b class="font-semibold text-[#1F2937]">Username:</b> admin
        </p>

        <p class="text-[#1F2937]">
          <b class="font-semibold text-[#1F2937]">Password:</b> admin123
        </p>
      </div>
    </div>
    </div>


 <script src="login.js"></script>

  </body>
</html>
