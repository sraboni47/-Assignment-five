<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer">

  <title>Assignment 5</title>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style.css">
</head>


<body>

  <!-- Header -->
  <header class="shadow-sm">

    <nav
      class="flex flex-col md:flex-row justify-between items-center gap-y-3 md:gap-y-0 pt-5 md:pt-0 max-w-[90%] sm:max-w-[70%] md:max-w-[95%] mx-auto">

      <!-- Logo -->
      <div class="flex items-center gap-2">

        <div class="w-9 h-9">
          <img src="github-logo.png" alt="GitHub Logo" class="w-full">
        </div>

        <h1 class="font-bold text-xl sm:text-2xl">
          GitHub Issues Tracker
        </h1>

      </div>

      <!-- Search -->
      <div class="flex items-center gap-2 p-4">

        <input
          id="search-input"
          type="text"
          placeholder="Search here..."
          class="input input-bordered shadow-sm max-w-[90%] sm:max-w-full">

        <button
          onclick="loadSearchIssues()"
          class="btn bg-[#4A00FF] text-white border-none">

          Search

        </button>

      </div>

    </nav>

  </header>



  <!-- Main Section -->
  <main class="my-14">


    <!-- Tabs -->
    <section class="max-w-[90%] sm:max-w-[85%] mx-auto">

      <div
        id="tabs-container"
        class="bg-white border border-gray-100 flex items-center flex-wrap gap-1 sm:gap-2 shadow-sm p-4">

        <button class="btn px-6 sm:px-10 btn-first tabs-btn">All</button>
        <button class="btn px-6 sm:px-10 tabs-btn">Open</button>
        <button class="btn px-6 sm:px-10 tabs-btn">Closed</button>

      </div>

    </section>



    <!-- Issues Section -->
    <section class="max-w-[90%] sm:max-w-[85%] mx-auto mt-14">


      <!-- Issue Header -->
      <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-y-5 sm:gap-y-0 p-4 shadow-sm">

        <div class="flex items-center gap-2.5">

          <div class="text-center">
            <img src="Aperture.png" alt="Issue Icon" class="w-full">
          </div>

          <div>
            <h2 class="font-semibold text-2xl">
              <span id="total-issues">0</span> Issues
            </h2>

            <p class="text-gray-500">
              Track and manage your project issues
            </p>
          </div>

        </div>


        <!-- Status -->
        <div class="flex items-center gap-5">

          <p class="flex items-center gap-1">

            <span>
              <i class="fa-solid fa-circle text-green-500"></i>
            </span>

            <span class="text-lg font-medium">
              Open
            </span>

          </p>

          <p class="flex items-center gap-1">

            <span>
              <i class="fa-solid fa-circle text-purple-500"></i>
            </span>

            <span class="text-lg font-medium">
              Closed
            </span>

          </p>

        </div>

      </div>



      <!-- Cards -->
      <div
        id="card-container"
        class="shadow-sm p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2.5">

      </div>



      <!-- Loading Spinner -->
      <div id="loading-spinner" class="hidden">

        <div class="flex justify-center items-center p-20 shadow-lg">
          <span class="loading loading-spinner loading-xl"></span>
        </div>

      </div>

    </section>



    <!-- Modal -->
    <dialog id="issue_modal" class="modal">

      <div id="modal-container" class="modal-box">
      </div>

      <div id="modal-loading-spinner" class="modal-box hidden">

        <div class="flex justify-center items-center p-20">
          <span class="loading loading-spinner loading-xl"></span>
        </div>

      </div>

    </dialog>


  </main>


  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
